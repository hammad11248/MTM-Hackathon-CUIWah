<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Doctor Connect — AI Triage & Directory</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Outfit', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#eff6ff',
              100: '#dbeafe',
              500: '#3b82f6',
              600: '#2563eb',
              900: '#1e3a8a',
            },
            teal: {
              500: '#14b8a6',
              600: '#0d9488',
            }
          }
        }
      }
    }
  </script>
  
  <style>
    body {
      background-color: #f8fafc;
      color: #334155;
    }
    
    .glass-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      border-radius: 16px;
      transition: all 0.2s ease-in-out;
    }
    .glass-card:hover {
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -2px rgba(0, 0, 0, 0.04);
      transform: translateY(-2px);
    }

    .input-field {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      font-weight: 500;
      outline: none;
      color: #1e293b;
      background-color: #ffffff;
      transition: all 0.2s ease;
    }
    .input-field:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .btn-primary {
      background: #2563eb;
      color: white;
      transition: all 0.2s ease-in-out;
      box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
    }
    .btn-primary:hover {
      background: #1d4ed8;
      box-shadow: 0 6px 8px -1px rgba(37, 99, 235, 0.3);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #f1f5f9;
      color: #475569;
      border: 1px solid #cbd5e1;
      transition: all 0.2s ease-in-out;
    }
    .btn-secondary:hover {
      background: #e2e8f0;
      color: #1e293b;
    }
    
    .chat-bubble-ai {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1e3a8a;
      border-bottom-left-radius: 4px;
    }
    .chat-bubble-user {
      background: #2563eb;
      color: #ffffff;
      border-bottom-right-radius: 4px;
    }

    /* Typing animation */
    .typing-dot {
      animation: typing 1.4s infinite ease-in-out both;
    }
    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes typing {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
    
    .skeleton {
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite linear;
      border-radius: 12px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>

<body class="antialiased min-h-screen relative font-sans">
  
  <header class="bg-white border-b border-slate-200 sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="/" class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-brand-500 flex items-center justify-center shadow-md">
          <span class="text-white text-xl">⚕️</span>
        </div>
        <div>
          <span class="font-display font-bold text-xl text-slate-900 leading-none block">Smart Doctor</span>
          <span class="text-brand-600 font-bold text-[10px] uppercase tracking-widest block mt-0.5">Connect AI</span>
        </div>
      </a>
      <nav class="flex items-center gap-4 text-sm font-semibold">
        <a href="/index.html" class="text-brand-600 bg-brand-50 px-4 py-2 rounded-lg">Directory</a>
        <a href="/doctor-dashboard.html" class="text-slate-500 hover:text-slate-900 transition-colors">For Doctors</a>
      </nav>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-10 grid grid-cols-1 lg:grid-cols-12 gap-8">
    
    <!-- Left Col: AI Triage -->
    <div class="lg:col-span-5 flex flex-col h-[700px]">
      <div class="mb-4">
        <h2 class="font-display text-2xl font-bold text-slate-900">AI Triage Assistant</h2>
        <p class="text-sm text-slate-500 mt-1">Describe your symptoms to receive instant medical routing.</p>
      </div>
      
      <div class="glass-card flex-1 flex flex-col p-5 h-full relative">
        <div id="chatMessages" class="flex-1 overflow-y-auto space-y-4 mb-4 pr-2 scroll-smooth">
          <div class="chat-bubble-ai self-start rounded-2xl px-4 py-3 max-w-[85%] shadow-sm text-sm leading-relaxed">
            <p>Hello! I am the Smart Doctor Connect AI. How are you feeling today?</p>
          </div>
        </div>
        
        <div class="flex gap-2">
          <input id="chatInput" type="text" placeholder="Type your symptoms here..." class="input-field flex-1" />
          <button id="btnChat" class="btn-primary px-5 py-2.5 rounded-xl font-semibold shadow-md">Send</button>
        </div>
      </div>
    </div>

    <!-- Right Col: Directory -->
    <div class="lg:col-span-7 flex flex-col h-[700px]">
      <div class="mb-4">
        <h1 class="font-display text-3xl font-bold text-slate-900">Find a Specialist</h1>
        <p class="text-sm text-slate-500 mt-1">Browse verified medical professionals.</p>
      </div>

      <div class="glass-card p-5 mb-6">
        <div class="flex flex-col sm:flex-row gap-3">
          <input id="searchQuery" type="text" placeholder="Search doctors, specializations, or conditions..." class="input-field flex-1" />
          <button id="btnSearch" class="btn-primary px-6 py-2.5 rounded-xl font-semibold shadow-md whitespace-nowrap">Search</button>
          <button id="btnNearMe" class="btn-secondary px-4 py-2.5 rounded-xl font-semibold whitespace-nowrap">📍 Near Me</button>
        </div>
      </div>

      <div id="docResults" class="flex-1 overflow-y-auto space-y-4 pr-2 pb-10">
        <!-- JS populates this -->
      </div>
    </div>

  </main>

  <script src="/js/app.js"></script>
  <script src="/js/search.js"></script>
  <script src="/js/triage-chat.js"></script>
</body>
</html>
